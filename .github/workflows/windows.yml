name: build-windows

on:
  push:
    branches: [main]
    paths:
      - server.py
      - index.html
      - favicon.svg
      - apple-touch-icon.png
      - packaging/launcher.vbs
      - packaging/build_win.ps1
      - packaging/INSTALL-Windows.txt
      - .github/workflows/windows.yml
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Windows package
        shell: pwsh
        run: ./packaging/build_win.ps1

      - name: Smoke test (boots + healthy; download best-effort)
        shell: pwsh
        run: |
          $app = "build-win\TubeRipper"
          $env:TR_APP="1"; $env:TR_NO_OPEN="1"; $env:TR_FFMPEG_DIR="$PWD\$app\bin"; $env:PORT="1337"
          Start-Process -FilePath "$app\python\python.exe" -ArgumentList "$app\app\server.py","--app" `
            -WindowStyle Hidden -RedirectStandardOutput "$app\out.log" -RedirectStandardError "$app\err.log" | Out-Null
          $ok = $false
          for ($i=0; $i -lt 20; $i++) {
            Start-Sleep -Seconds 2
            try { $h = Invoke-RestMethod "http://localhost:1337/api/health"; if ($h.ytdlp -and $h.ffmpeg) { $ok=$true; break } } catch {}
          }
          if ($ok) { "health: ytdlp=$($h.ytdlp) ffmpeg=$($h.ffmpeg) version=$($h.version)" }
          else {
            "--- server stderr ---"; Get-Content "$app\err.log" -ErrorAction SilentlyContinue
            "--- server stdout ---"; Get-Content "$app\out.log" -ErrorAction SilentlyContinue
            throw "server did not boot healthy on Windows"
          }
          # A real download is best-effort: GitHub runners are datacenter IPs that
          # YouTube frequently blocks (403). Failure here does NOT fail the build.
          try {
            $job = Invoke-RestMethod -Method Post "http://localhost:1337/api/download" -ContentType "application/json" -Body '{"url":"https://youtu.be/aqz-KE-bpKQ","quality":"standard"}'
            for ($i=0; $i -lt 25; $i++) { Start-Sleep -Seconds 3; $st = (Invoke-RestMethod "http://localhost:1337/api/progress?id=$($job.job_id)").status; if ($st -in 'done','error') { break } }
            "download (best-effort, CI IP may be blocked): $st"
          } catch { "download attempt errored (expected on CI): $_" }
          try { Invoke-RestMethod "http://localhost:1337/api/quit" | Out-Null } catch {}
          "Windows boot test PASSED"

      - uses: actions/upload-artifact@v4
        with:
          name: TubeRipper-Windows
          path: dist/TubeRipper-Windows.zip

      - name: Publish downloadable release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view windows-latest 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create windows-latest dist/TubeRipper-Windows.zip --title "TUBE-RIPPER - Windows build" --notes "Auto-built from main. Download TubeRipper-Windows.zip, extract, double-click TubeRipper.vbs."
          } else {
            gh release upload windows-latest dist/TubeRipper-Windows.zip --clobber
          }
